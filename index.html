<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Library</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        #results { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }

<h1>Anime search</h1>
<input type="text" id="search" placeholder="Type the anime name">
<button onclick="animeSearch()">Search</button>

<div id="results"></div>

<script src="app.js"></script>
</body>
</html>
